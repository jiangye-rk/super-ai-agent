spring:
  application:
    name: jiang-ai-agent
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/jiang_ai_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: your-username
    password: your-password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: HikariPool-ChatMemory
  ai:
    dashscope:
      api-key: your-api-key
      chat:
        options:
          model: qwen-plus
# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/**/*.xml

# 日志配置
logging:
  level:
    com.jiangye.jiangaiagent.chatmemory: DEBUG
    org.springframework.ai: DEBUG
server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.jiangye.jiangaiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
